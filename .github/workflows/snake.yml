name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: kripy17
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ff4444&color_dot=#1a1a2e&color_dot_light=#6b0000&color_dot_dark=#8B0000
            dist/github-contribution-grid-snake-dark.svg?color_snake=ff4444&color_dot=#1a1a2e&color_dot_light=#6b0000&color_dot_dark=#8B0000

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
